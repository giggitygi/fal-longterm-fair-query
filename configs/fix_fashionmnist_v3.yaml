seed: 42
device: cuda
output_root: runs/fal_longterm_fair_query

dataset:
  name: FashionMNIST
  root: data/torchvision
  download: false
  max_train_samples: 10000
  max_test_samples: 2000

federated:
  num_clients: 20
  dirichlet_alpha: 0.3
  initial_labels_per_client: 80
  num_rounds: 30
  participation_rate: 0.2
  availability_skew: long_tail
  local_epochs: 2
  batch_size: 64
  lr: 0.02
  optimizer: sgd
  round_order: query_train_eval
  warmup_rounds: 5
  warmup_client_scope: all

active_learning:
  strategy: entropy
  query_budget: 100
  candidate_pool_per_client: 80
  lambda_q: 0.6
  lambda_r: 0.4
  memory_size: 2048
  debt_target_mode: available_equal

model:
  name: simple_cnn
